<div th:fragment="sidebar" xmlns:th="http://www.thymeleaf.org">
    <div class="app-mobile-bar d-lg-none">
        <div class="d-flex align-items-center justify-content-between">
            <div class="fw-bold">Library System</div>
            <button class="btn btn-outline-primary btn-sm" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu" aria-controls="sidebarMenu">
                <i class="bi bi-list"></i>
            </button>
        </div>
    </div>

    <div class="offcanvas offcanvas-start d-lg-none" tabindex="-1" id="sidebarMenu" aria-labelledby="sidebarLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="sidebarLabel">Library System</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body p-0">
            <div class="app-sidebar w-100 min-vh-100">
                <div th:replace="~{fragments/sidebar :: navLinks}"></div>
            </div>
        </div>
    </div>

    <aside class="app-sidebar d-none d-lg-block">
        <div th:replace="~{fragments/sidebar :: navLinks}"></div>
    </aside>
</div>

<div th:fragment="navLinks" xmlns:th="http://www.thymeleaf.org">
    <div class="app-brand">
        <div class="app-brand-mark">L</div>
        <div>
            <div class="app-brand-title">Library</div>
            <div class="app-brand-subtitle">Management System</div>
        </div>
    </div>

    <nav class="app-nav" aria-label="Main navigation">
        <a class="app-nav-link" th:href="@{/admin}">
            <i class="bi bi-speedometer2"></i>
            <span>Dashboard</span>
        </a>
        <a class="app-nav-link" th:href="@{/books}">
            <i class="bi bi-book"></i>
            <span>Books</span>
        </a>
        <a class="app-nav-link" th:href="@{/users}">
            <i class="bi bi-people"></i>
            <span>Users</span>
        </a>
        <a class="app-nav-link" th:href="@{/transactions}">
            <i class="bi bi-arrow-left-right"></i>
            <span>Transactions</span>
        </a>
        <a class="app-nav-link" th:href="@{/reports}">
            <i class="bi bi-bar-chart"></i>
            <span>Reports</span>
        </a>
        <a class="app-nav-link" th:href="@{/admin/change-password}">
            <i class="bi bi-shield-lock"></i>
            <span>Password</span>
        </a>
        <form th:action="@{/admin/logout}" method="post" class="mt-3">
            <button type="submit" class="app-nav-button">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </button>
        </form>
    </nav>
</div>
