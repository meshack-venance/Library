<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">User Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div class="app-shell d-lg-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="app-main">
        <header class="page-header">
            <div>
                <div class="page-kicker">User Details</div>
                <h1 class="page-title" th:text="${userDto.fullName}">User Name</h1>
                <p class="page-subtitle">Borrower profile and account information.</p>
            </div>
            <a th:href="@{/users}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
        </header>

        <section class="surface surface-pad">
            <div class="row g-3">
                <div class="col-md-6">
                    <span class="text-muted d-block">First Name</span>
                    <strong th:text="${userDto.firstName}">First</strong>
                </div>
                <div class="col-md-6">
                    <span class="text-muted d-block">Middle Name</span>
                    <strong th:text="${userDto.middleName}">Middle</strong>
                </div>
                <div class="col-md-6">
                    <span class="text-muted d-block">Last Name</span>
                    <strong th:text="${userDto.lastName}">Last</strong>
                </div>
                <div class="col-md-6">
                    <span class="text-muted d-block">Email</span>
                    <strong th:text="${userDto.email}">email@example.com</strong>
                </div>
                <div class="col-md-6">
                    <span class="text-muted d-block">User Type</span>
                    <strong th:text="${userDto.userType}">STUDENT</strong>
                </div>
                <div class="col-md-6">
                    <span class="text-muted d-block">Classroom</span>
                    <strong th:text="${userDto.clsRoom}">Form I</strong>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <a th:href="@{/users/edit/{id}(id=${userDto.id})}" class="btn btn-primary">
                    <i class="bi bi-pencil me-1"></i>Edit
                </a>
                <form th:action="@{/users/delete/{id}(id=${userDto.id})}" method="post">
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('Are you sure you want to delete this user?');">
                        <i class="bi bi-trash me-1"></i>Delete
                    </button>
                </form>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
