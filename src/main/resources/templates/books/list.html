<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Books</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div class="app-shell d-lg-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="app-main">
        <header class="page-header">
            <div>
                <div class="page-kicker">Collection</div>
                <h1 class="page-title" th:text="${title}">Books</h1>
                <p class="page-subtitle">Manage titles, copies, categories, and grade-level resources.</p>
            </div>
            <a class="btn btn-primary" th:href="@{/books/new}">
                <i class="bi bi-plus-lg me-1"></i>Add Book
            </a>
        </header>

        <section class="surface">
            <div class="surface-pad border-bottom">
                <form method="get" class="row g-2 align-items-center">
                    <div class="col-auto">
                        <label for="bookPageSize" class="form-label mb-0 text-muted fw-semibold">Rows</label>
                    </div>
                    <div class="col-auto">
                        <select id="bookPageSize" class="form-select" name="size" onchange="this.form.submit()">
                            <option th:selected="${size == 5}" value="5">5</option>
                            <option th:selected="${size == 10}" value="10">10</option>
                            <option th:selected="${size == 20}" value="20">20</option>
                        </select>
                    </div>
                    <input type="hidden" name="page" th:value="${currentPage}" />
                </form>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Title</th>
                        <th>Subject</th>
                        <th>Author</th>
                        <th>Grade</th>
                        <th>Year</th>
                        <th>Category</th>
                        <th>Number</th>
                        <th>Price</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="book, iterStat : ${bookPage.content}">
                        <td th:text="${iterStat.index + 1 + (currentPage * size)}">1</td>
                        <td class="fw-semibold" th:text="${book.title}">Title</td>
                        <td th:text="${book.subject}">Subject</td>
                        <td th:text="${book.author}">Author</td>
                        <td><span class="badge text-bg-light" th:text="${book.gradeLevel}">Grade</span></td>
                        <td th:text="${book.publicationYear}">2023</td>
                        <td th:text="${book.category}">Category</td>
                        <td th:text="${book.bookNumber}">Number</td>
                        <td th:text="${book.price}">100.00</td>
                        <td>
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{'/books/' + ${book.id}}" class="btn btn-sm btn-outline-primary" title="View"><i class="bi bi-eye"></i></a>
                                <a th:href="@{'/books/edit/' + ${book.id}}" class="btn btn-sm btn-warning" title="Edit"><i class="bi bi-pencil"></i></a>
                                <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-danger" title="Delete"
                                            onclick="return confirm('Are you sure you want to delete this book?')">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${bookPage.totalElements == 0}">
                        <td colspan="10">
                            <div class="empty-state">No books found.</div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <nav aria-label="Book pages" class="mt-4" th:if="${totalPages > 0}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/books(page=${currentPage - 1}, size=${size})}">Previous</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/books(page=${i}, size=${size})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/books(page=${currentPage + 1}, size=${size})}">Next</a>
                </li>
            </ul>
        </nav>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
