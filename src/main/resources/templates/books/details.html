<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Details for: ' + ${book.title}">Book Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div class="app-shell d-lg-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="app-main">
        <header class="page-header">
            <div>
                <div class="page-kicker">Book Details</div>
                <h1 class="page-title" th:text="${book.title}">Book Title</h1>
                <p class="page-subtitle">Catalogue information and management actions.</p>
            </div>
            <a th:href="@{/books}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
        </header>

        <section class="surface surface-pad">
            <div class="row g-3">
                <div class="col-md-6"><span class="text-muted d-block">Subject</span><strong th:text="${book.subject}">Subject</strong></div>
                <div class="col-md-6"><span class="text-muted d-block">Grade Level</span><strong th:text="${book.gradeLevel}">Grade</strong></div>
                <div class="col-md-6"><span class="text-muted d-block">Author</span><strong th:text="${book.author}">Author</strong></div>
                <div class="col-md-6"><span class="text-muted d-block">Publication Year</span><strong th:text="${book.publicationYear}">Year</strong></div>
                <div class="col-md-6"><span class="text-muted d-block">Category</span><strong th:text="${book.category}">Category</strong></div>
                <div class="col-md-6"><span class="text-muted d-block">Book Number</span><strong th:text="${book.bookNumber}">Book Number</strong></div>
                <div class="col-md-6"><span class="text-muted d-block">Price</span><strong th:text="${book.price}">Price</strong></div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-primary">
                    <i class="bi bi-pencil me-1"></i>Edit
                </a>
                <a th:href="@{/books/delete/{id}(id=${book.id})}" class="btn btn-danger"
                   onclick="return confirm('Are you sure you want to delete this book?');">
                    <i class="bi bi-trash me-1"></i>Delete
                </a>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
