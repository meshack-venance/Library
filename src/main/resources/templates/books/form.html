<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${book.id == null ? 'Add New Book' : 'Edit Book'}">Book Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div class="app-shell d-lg-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="app-main">
        <header class="page-header">
            <div>
                <div class="page-kicker">Collection</div>
                <h1 class="page-title" th:text="${book.id == null ? 'Add New Book' : 'Edit Book'}">Book Form</h1>
                <p class="page-subtitle">Keep catalogue information clear, searchable, and ready for circulation.</p>
            </div>
            <a class="btn btn-outline-secondary" th:href="@{/books}">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
        </header>

        <div class="row g-4">
            <div class="col-xl-8">
                <section class="surface surface-pad">
                    <form th:action="@{/books/save}" th:object="${book}" method="post">
                        <input type="hidden" th:field="*{id}" />
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Book Title</label>
                                <input type="text" th:field="*{title}" class="form-control" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Subject</label>
                                <input type="text" th:field="*{subject}" class="form-control" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Form Level</label>
                                <select th:field="*{gradeLevel}" class="form-select">
                                    <option value="">Select form</option>
                                    <option value="Form I">Form I</option>
                                    <option value="Form II">Form II</option>
                                    <option value="Form III">Form III</option>
                                    <option value="Form IV">Form IV</option>
                                    <option value="Form V">Form V</option>
                                    <option value="Form VI">Form VI</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Author</label>
                                <input type="text" th:field="*{author}" class="form-control" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Publication Year</label>
                                <input type="number" th:field="*{publicationYear}" class="form-control" min="1900" max="2100" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                <select th:field="*{category}" class="form-select">
                                    <option value="">Select category</option>
                                    <option value="Textbook">Textbook</option>
                                    <option value="Reference">Reference</option>
                                    <option value="Novel">Novel</option>
                                    <option value="Past Papers">Past Papers</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Book Number</label>
                                <input type="text" th:field="*{bookNumber}" class="form-control" placeholder="00/00" />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Price (TSh)</label>
                                <input type="number" step="0.01" th:field="*{price}" class="form-control" />
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a class="btn btn-outline-secondary" th:href="@{/books}">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check2 me-1"></i>Save Book
                            </button>
                        </div>
                    </form>
                </section>
            </div>

            <div class="col-xl-4">
                <section class="surface surface-pad">
                    <h2 class="h5 fw-bold mb-2">Import Books</h2>
                    <p class="text-muted">Upload an Excel file to add books in bulk.</p>
                    <form th:action="@{/books/import}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="excelFile" class="form-label">Excel File</label>
                            <input type="file" name="file" id="excelFile" class="form-control" accept=".xlsx,.xls" required>
                        </div>
                        <button type="submit" class="btn btn-outline-primary w-100">
                            <i class="bi bi-upload me-1"></i>Import
                        </button>
                    </form>
                </section>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
