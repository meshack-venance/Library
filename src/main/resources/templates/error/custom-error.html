<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${status} + ' ' + ${error}">Error</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<main class="login-page d-flex align-items-center justify-content-center p-3">
    <section class="login-card text-center">
        <div class="app-brand-mark mx-auto mb-3">!</div>
        <p class="page-kicker mb-1" th:text="${status}">404</p>
        <h1 class="h3 fw-bold" th:text="${error}">Not Found</h1>
        <p class="text-muted" th:text="${message}">The requested resource could not be found.</p>
        <a th:href="@{/admin}" class="btn btn-primary">
            <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
        </a>
    </section>
</main>
</body>
</html>
