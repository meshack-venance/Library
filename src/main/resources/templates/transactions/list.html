<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${title}">Transactions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div class="app-shell d-lg-flex">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="app-main">
        <header class="page-header">
            <div>
                <div class="page-kicker">Circulation</div>
                <h1 class="page-title" th:text="${title}">Transactions</h1>
                <p class="page-subtitle">Track borrowed books, due dates, returns, and user history.</p>
            </div>
            <a class="btn btn-primary" th:href="@{/transactions/new}">
                <i class="bi bi-plus-lg me-1"></i>New Transaction
            </a>
        </header>

        <section class="surface mb-4">
            <div class="surface-pad">
                <form method="get" th:action="@{/transactions}">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                        <input type="text" name="search" class="form-control" placeholder="Search by user name..." th:value="${param.search}">
                        <button class="btn btn-primary" type="submit">Search</button>
                        <a class="btn btn-outline-secondary" th:href="@{/transactions}">Clear</a>
                    </div>
                </form>
            </div>
        </section>

        <section class="surface">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Book</th>
                        <th>Subject</th>
                        <th>Grade</th>
                        <th>Number</th>
                        <th>User</th>
                        <th>Status</th>
                        <th>Borrow Date</th>
                        <th>Return Date</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="tx, iterStat : ${transactions}">
                        <th scope="row" th:text="${iterStat.count}">1</th>
                        <td class="fw-semibold" th:text="${tx.bookTitle}">Book Title</td>
                        <td th:text="${tx.bookSubject}">Book Subject</td>
                        <td><span class="badge text-bg-light" th:text="${tx.bookGradeLevel}">Grade</span></td>
                        <td th:text="${tx.bookNumber}">Book Number</td>
                        <td th:text="${tx.fullName}">User Full Name</td>
                        <td>
                            <span class="badge-soft"
                                  th:classappend="${tx.status == 'borrowed'} ? ' badge-borrowed' : ' badge-returned'"
                                  th:text="${tx.status}">borrowed</span>
                        </td>
                        <td th:text="${tx.borrowDate}">2025-07-19</td>
                        <td th:text="${tx.returnDate}">2025-08-01</td>
                        <td>
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{'/transactions/edit/' + ${tx.id}}" class="btn btn-sm btn-warning" title="Edit"><i class="bi bi-pencil"></i></a>
                                <form th:action="@{/transactions/delete/{id}(id=${tx.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-danger" title="Delete"
                                            onclick="return confirm('Are you sure you want to delete this transaction?')">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                                <form th:if="${tx.status == 'borrowed'}"
                                      th:action="@{/transactions/return/{id}(id=${tx.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-outline-primary" title="Return">
                                        <i class="bi bi-arrow-return-left"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${transactions.size() == 0}">
                        <td colspan="10">
                            <div class="empty-state">No transactions found.</div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
